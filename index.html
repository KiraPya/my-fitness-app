<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Fitness Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#080808;min-height:100vh;font-family:'DM Sans',sans-serif;color:#fff}
  input,button{font-family:'DM Sans',sans-serif}
  input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.3)}
  ::-webkit-scrollbar{width:0}
  .app{max-width:420px;margin:0 auto;min-height:100vh;background:#080808;position:relative}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback}=React;

const WORKOUT_TYPES=[
  {id:"legs1",label:"Legs Day 1",sub:"Glutes + Posterior",color:"#E8855A"},
  {id:"legs2",label:"Legs Day 2",sub:"Glutes + Quads",color:"#D4A843"},
  {id:"back",label:"Back",sub:"Pull Day",color:"#5A9BE8"},
  {id:"chest",label:"Chest & Shoulders",sub:"Push Day",color:"#8E5AE8"},
  {id:"mixed",label:"Mixed",sub:"Back + Legs",color:"#5AE8A2"},
  {id:"cardio",label:"Cardio / Padel",sub:"Activity",color:"#E85A8E"},
];

const EXERCISES={
  legs1:[
    {name:"Back Extension",w:0,note:"Warm-up, no weight"},
    {name:"DB Squats",w:12},
    {name:"Bulgarian Split Squats",w:10},
    {name:"Deadlifts",w:20},
    {name:"Abductors",w:45},
    {name:"Adductors",w:45,note:"Optional"},
    {name:"Calves",w:0,note:"Optional"},
  ],
  legs2:[
    {name:"Back Extension",w:0,note:"No weight"},
    {name:"Hip Thrust",w:30},
    {name:"Walking Lunges",w:0,note:"Bodyweight or light"},
    {name:"Rear-Foot Elevated Split Squat",w:5},
    {name:"Leg Extension",w:50},
    {name:"Abductors",w:30},
  ],
  back:[
    {name:"Lat Pulldown",w:27.5},
    {name:"Seated Cable Row",w:27.5},
    {name:"Straight Arm Pulldown",w:12.5},
    {name:"Reverse Pec Deck",w:14.5},
    {name:"Supported Pull-Ups",w:35,note:"Support weight"},
    {name:"Bicep Curls",w:5},
  ],
  chest:[
    {name:"Chest Press",w:19},
    {name:"Incline / ISO Press",w:15},
    {name:"Pec Deck",w:17},
    {name:"Shoulder Press",w:15},
    {name:"Lateral Raises",w:4},
    {name:"Triceps",w:8},
  ],
  mixed:[
    {name:"Lat Pulldown",w:27.5},
    {name:"Seated Cable Row",w:27.5},
    {name:"Hip Thrust",w:30},
    {name:"Leg Extension",w:50},
    {name:"Abductors",w:45},
  ],
  cardio:[],
};

const TAGS=["Strong day","Low energy","Cycle phase","Heavy","Light","Recovery"];
const INTENSITIES=["Low","Medium","High"];

function loadWorkouts(){try{return JSON.parse(localStorage.getItem("ft2_workouts")||"[]")}catch{return[]}}
function saveWorkouts(w){localStorage.setItem("ft2_workouts",JSON.stringify(w))}
function fmtDate(iso){const d=new Date(iso);return d.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"})}
function today(){return new Date().toISOString().split("T")[0]}
function getWeek(iso){const d=new Date(iso);const day=d.getDay()||7;d.setDate(d.getDate()+4-day);const y=new Date(d.getFullYear(),0,1);return d.getFullYear()+"-W"+Math.ceil(((d-y)/86400000+1)/7).toString().padStart(2,"0")}
function getType(id){return WORKOUT_TYPES.find(w=>w.id===id)||WORKOUT_TYPES[0]}

function TagBtn({label,active,onClick,color}){
  return <button onClick={onClick} style={{padding:"4px 10px",borderRadius:20,border:"1px solid "+(active?(color||"#fff"):"#333"),background:active?(color||"#fff")+"22":"transparent",color:active?(color||"#fff"):"#666",fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>{label}</button>
}

function NumInput({value,onChange,step=0.5,min=0,label}){
  return(
    <div style={{display:"flex",flexDirection:"column",gap:4,flex:1}}>
      {label&&<span style={{fontSize:11,color:"#555",letterSpacing:"0.05em",textTransform:"uppercase"}}>{label}</span>}
      <div style={{display:"flex",alignItems:"center",background:"#1a1a1a",borderRadius:8,overflow:"hidden",border:"1px solid #2a2a2a"}}>
        <button onClick={()=>onChange(Math.max(min,+(value-step).toFixed(2)))} style={{padding:"8px 12px",background:"none",border:"none",color:"#666",fontSize:18,cursor:"pointer",lineHeight:1}}>-</button>
        <span style={{flex:1,textAlign:"center",color:"#fff",fontSize:15}}>{value}</span>
        <button onClick={()=>onChange(+(value+step).toFixed(2))} style={{padding:"8px 12px",background:"none",border:"none",color:"#666",fontSize:18,cursor:"pointer",lineHeight:1}}>+</button>
      </div>
    </div>
  )
}

function ExerciseRow({exercise,onChange,onRemove,typeColor}){
  const[expanded,setExpanded]=useState(false);
  return(
    <div style={{borderRadius:12,border:"1px solid #222",background:"#0d0d0d",overflow:"hidden",marginBottom:8}}>
      <div onClick={()=>setExpanded(!expanded)} style={{padding:"12px 14px",display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
        <div style={{width:6,height:6,borderRadius:"50%",background:typeColor,flexShrink:0}}/>
        <span style={{flex:1,fontSize:14,color:exercise.name?"#fff":"#444",fontWeight:500}}>{exercise.name||"Exercise name"}</span>
        <span style={{fontSize:12,color:"#444"}}>{exercise.weight>0?exercise.weight+"kg":"BW"} x {exercise.sets}x{exercise.reps}</span>
        <span style={{color:"#444",fontSize:14}}>{expanded?"▴":"▾"}</span>
      </div>
      {expanded&&(
        <div style={{padding:"0 14px 14px",display:"flex",flexDirection:"column",gap:12}}>
          <input value={exercise.name} onChange={e=>onChange({...exercise,name:e.target.value})} placeholder="Exercise name"
            style={{background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:8,padding:"8px 12px",color:"#fff",fontSize:14,width:"100%"}}/>
          <div style={{display:"flex",gap:8}}>
            <NumInput label="Weight kg" value={exercise.weight} step={0.5} onChange={v=>onChange({...exercise,weight:v})}/>
            <NumInput label="Sets" value={exercise.sets} step={1} min={1} onChange={v=>onChange({...exercise,sets:v})}/>
            <NumInput label="Reps" value={exercise.reps} step={1} min={1} onChange={v=>onChange({...exercise,reps:v})}/>
          </div>
          <input value={exercise.notes||""} onChange={e=>onChange({...exercise,notes:e.target.value})} placeholder="Notes (optional)"
            style={{background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:8,padding:"8px 12px",color:"#fff",fontSize:13,width:"100%"}}/>
          <button onClick={onRemove} style={{background:"none",border:"none",color:"#c0392b",fontSize:12,cursor:"pointer",textAlign:"left",padding:0}}>Remove exercise</button>
        </div>
      )}
    </div>
  )
}

function HomeView({workouts,onStart,onHistory,onProgress}){
  const recent=[...workouts].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,3);
  const thisWeek=getWeek(today());
  const ww=workouts.filter(w=>getWeek(w.date)===thisWeek);
  const hit=ww.length>=3;
  return(
    <div style={{padding:"24px 20px 100px"}}>
      <div style={{marginBottom:32}}>
        <p style={{color:"#555",fontSize:13,marginBottom:4,letterSpacing:"0.08em",textTransform:"uppercase"}}>
          {new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"})}
        </p>
        <h1 style={{fontSize:28,fontFamily:"'DM Serif Display',serif",fontWeight:400,color:"#fff",margin:0}}>Let's train.</h1>
      </div>

      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:28,padding:"14px 16px",borderRadius:12,background:hit?"#5AE8A222":"#1a1a1a",border:"1px solid "+(hit?"#5AE8A244":"#2a2a2a")}}>
        <span style={{fontSize:22}}>{hit?"🔥":"⚡"}</span>
        <div>
          <p style={{margin:0,fontSize:13,color:"#fff",fontWeight:500}}>{ww.length} session{ww.length!==1?"s":""} this week</p>
          <p style={{margin:0,fontSize:12,color:"#555"}}>{hit?"Goal hit — 3+ sessions ✓":(3-ww.length)+" more to hit weekly goal"}</p>
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:4}}>
          {[1,2,3,4].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:i<=ww.length?"#5AE8A2":"#2a2a2a"}}/>)}
        </div>
      </div>

      <p style={{fontSize:12,color:"#444",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:12}}>Start workout</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:32}}>
        {WORKOUT_TYPES.map(t=>(
          <button key={t.id} onClick={()=>onStart(t.id)} style={{padding:"14px",borderRadius:12,border:"1px solid #2a2a2a",background:"#111",cursor:"pointer",textAlign:"left"}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:t.color,marginBottom:8}}/>
            <p style={{margin:0,fontSize:13,fontWeight:500,color:"#fff"}}>{t.label}</p>
            <p style={{margin:0,fontSize:11,color:"#555",marginTop:2}}>{t.sub}</p>
          </button>
        ))}
      </div>

      {recent.length>0&&(
        <>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <p style={{fontSize:12,color:"#444",letterSpacing:"0.08em",textTransform:"uppercase",margin:0}}>Recent</p>
            <button onClick={onHistory} style={{background:"none",border:"none",color:"#555",fontSize:12,cursor:"pointer"}}>View all</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {recent.map(w=>{
              const t=getType(w.typeId);
              return(
                <div key={w.id} style={{padding:"12px 14px",borderRadius:10,background:"#111",border:"1px solid #1e1e1e",display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:t.color,flexShrink:0}}/>
                  <div style={{flex:1}}>
                    <p style={{margin:0,fontSize:13,color:"#fff",fontWeight:500}}>{t.label}</p>
                    <p style={{margin:0,fontSize:11,color:"#444"}}>{fmtDate(w.date)} · {w.exercises?.length||0} exercises</p>
                  </div>
                  {w.tags?.length>0&&<span style={{fontSize:11,color:"#444"}}>{w.tags[0]}</span>}
                </div>
              )
            })}
          </div>
        </>
      )}
    </div>
  )
}

function LogWorkout({typeId,onSave,onBack}){
  const type=getType(typeId);
  const isCardio=typeId==="cardio";
  const mkEx=()=>(EXERCISES[typeId]||[]).map((e,i)=>({id:Date.now()+i,name:e.name,weight:e.w,sets:3,reps:10,notes:e.note||""}));
  const[date,setDate]=useState(today());
  const[exercises,setExercises]=useState(mkEx);
  const[tags,setTags]=useState([]);
  const[energy,setEnergy]=useState(null);
  const[cardio,setCardio]=useState({duration:45,intensity:"Medium",notes:""});
  const toggleTag=t=>setTags(p=>p.includes(t)?p.filter(x=>x!==t):[...p,t]);
  const updEx=(id,u)=>setExercises(p=>p.map(e=>e.id===id?u:e));
  const rmEx=id=>setExercises(p=>p.filter(e=>e.id!==id));
  const addEx=()=>setExercises(p=>[...p,{id:Date.now(),name:"",weight:0,sets:3,reps:10,notes:""}]);
  const save=()=>{onSave({id:Date.now(),date,typeId,exercises:isCardio?[]:exercises.filter(e=>e.name),cardio:isCardio?cardio:null,tags,energy})};
  return(
    <div style={{padding:"20px 20px 120px"}}>
      <button onClick={onBack} style={{background:"none",border:"none",color:"#555",cursor:"pointer",padding:0,marginBottom:20,fontSize:13}}>Back</button>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
        <div style={{width:10,height:10,borderRadius:"50%",background:type.color}}/>
        <h2 style={{margin:0,fontSize:22,fontFamily:"'DM Serif Display',serif",fontWeight:400,color:"#fff"}}>{type.label}</h2>
      </div>
      <p style={{margin:"0 0 24px",color:"#555",fontSize:13}}>{type.sub}</p>

      <div style={{marginBottom:24}}>
        <p style={{fontSize:11,color:"#444",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>Date</p>
        <input type="date" value={date} onChange={e=>setDate(e.target.value)}
          style={{background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:8,padding:"8px 12px",color:"#fff",fontSize:14,width:"100%"}}/>
      </div>

      {isCardio?(
        <div style={{marginBottom:24,display:"flex",flexDirection:"column",gap:12}}>
          <p style={{fontSize:11,color:"#444",letterSpacing:"0.08em",textTransform:"uppercase",margin:0}}>Activity</p>
          <NumInput label="Duration (min)" value={cardio.duration} step={5} min={5} onChange={v=>setCardio(c=>({...c,duration:v}))}/>
          <div>
            <p style={{fontSize:11,color:"#444",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8}}>Intensity</p>
            <div style={{display:"flex",gap:8}}>
              {INTENSITIES.map(i=><TagBtn key={i} label={i} active={cardio.intensity===i} color={type.color} onClick={()=>setCardio(c=>({...c,intensity:i}))}/>)}
            </div>
          </div>
          <input value={cardio.notes} onChange={e=>setCardio(c=>({...c,notes:e.target.value}))} placeholder="Notes (e.g. padel match)"
            style={{background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:8,padding:"8px 12px",color:"#fff",fontSize:13,width:"100%"}}/>
        </div>
      ):(
        <>
          <p style={{fontSize:11,color:"#444",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:12}}>Exercises</p>
          {exercises.map(ex=><ExerciseRow key={ex.id} exercise={ex} typeColor={type.color} onChange={u=>updEx(ex.id,u)} onRemove={()=>rmEx(ex.id)}/>)}
          <button onClick={addEx} style={{width:"100%",padding:"10px",borderRadius:10,border:"1px dashed #2a2a2a",background:"none",color:"#555",fontSize:13,cursor:"pointer",marginBottom:24,marginTop:4}}>+ Add exercise</button>
        </>
      )}

      <div style={{marginBottom:20}}>
        <p style={{fontSize:11,color:"#444",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8}}>Energy level</p>
        <div style={{display:"flex",gap:8}}>
          {["Low","Medium","High"].map(e=><TagBtn key={e} label={e} active={energy===e} color={type.color} onClick={()=>setEnergy(energy===e?null:e)}/>)}
        </div>
      </div>

      <div style={{marginBottom:28}}>
        <p style={{fontSize:11,color:"#444",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8}}>Tags</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {TAGS.map(t=><TagBtn key={t} label={t} active={tags.includes(t)} color={type.color} onClick={()=>toggleTag(t)}/>)}
        </div>
      </div>

      <button onClick={save} style={{width:"100%",padding:"14px",borderRadius:12,background:type.color,border:"none",color:"#000",fontSize:15,fontWeight:600,cursor:"pointer"}}>Save Workout</button>
    </div>
  )
}

function HistoryView({workouts,onBack}){
  const sorted=[...workouts].sort((a,b)=>b.date.localeCompare(a.date));
  const[expanded,setExpanded]=useState(null);
  return(
    <div style={{padding:"24px 20px 100px"}}>
      <button onClick={onBack} style={{background:"none",border:"none",color:"#555",cursor:"pointer",padding:0,marginBottom:24,fontSize:13}}>Back</button>
      <h2 style={{fontFamily:"'DM Serif Display',serif",fontWeight:400,color:"#fff",margin:"0 0 4px"}}>History</h2>
      <p style={{color:"#444",fontSize:13,marginBottom:24}}>{sorted.length} sessions logged</p>
      {sorted.length===0&&<p style={{color:"#444",fontSize:14}}>No workouts logged yet.</p>}
      {sorted.map(w=>{
        const t=getType(w.typeId);
        const isExp=expanded===w.id;
        return(
          <div key={w.id} style={{marginBottom:8,borderRadius:12,border:"1px solid #1e1e1e",background:"#0d0d0d",overflow:"hidden"}}>
            <div onClick={()=>setExpanded(isExp?null:w.id)} style={{padding:"14px 16px",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:t.color,flexShrink:0}}/>
              <div style={{flex:1}}>
                <p style={{margin:0,fontSize:14,color:"#fff",fontWeight:500}}>{t.label}</p>
                <p style={{margin:0,fontSize:12,color:"#444",marginTop:2}}>{fmtDate(w.date)}</p>
              </div>
              {w.cardio&&<span style={{fontSize:12,color:"#555"}}>{w.cardio.duration}min</span>}
              {!w.cardio&&<span style={{fontSize:12,color:"#555"}}>{w.exercises?.length||0} ex.</span>}
              <span style={{color:"#333",fontSize:12}}>{isExp?"▴":"▾"}</span>
            </div>
            {isExp&&(
              <div style={{padding:"0 16px 14px",borderTop:"1px solid #1a1a1a"}}>
                {w.energy&&<p style={{fontSize:12,color:"#555",marginTop:10,marginBottom:8}}>Energy: {w.energy}</p>}
                {w.tags?.length>0&&(
                  <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
                    {w.tags.map(t=><span key={t} style={{padding:"2px 8px",borderRadius:12,background:"#1a1a1a",color:"#555",fontSize:11}}>{t}</span>)}
                  </div>
                )}
                {w.cardio&&(
                  <div style={{color:"#888",fontSize:13}}>
                    <p style={{margin:"0 0 4px"}}>Duration: {w.cardio.duration} min · {w.cardio.intensity}</p>
                    {w.cardio.notes&&<p style={{margin:0,color:"#555"}}>{w.cardio.notes}</p>}
                  </div>
                )}
                {w.exercises?.map((ex,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #141414"}}>
                    <span style={{fontSize:13,color:"#ccc"}}>{ex.name}</span>
                    <span style={{fontSize:12,color:"#555"}}>{ex.weight>0?ex.weight+"kg":"BW"} {ex.sets}x{ex.reps}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        )
      })}
    </div>
  )
}

function ProgressView({workouts,onBack}){
  const[sel,setSel]=useState(null);
  const map={};
  workouts.forEach(w=>(w.exercises||[]).forEach(ex=>{if(!ex.name)return;if(!map[ex.name])map[ex.name]=[];map[ex.name].push({date:w.date,weight:ex.weight,sets:ex.sets,reps:ex.reps})}));
  const exs=Object.keys(map).sort();
  const hist=sel?[...map[sel]].sort((a,b)=>a.date.localeCompare(b.date)):[];
  const maxW=hist.reduce((m,h)=>Math.max(m,h.weight),0);
  const last2=hist.slice(-2);
  const improved=last2.length===2&&last2[1].weight>last2[0].weight;
  return(
    <div style={{padding:"24px 20px 100px"}}>
      <button onClick={onBack} style={{background:"none",border:"none",color:"#555",cursor:"pointer",padding:0,marginBottom:24,fontSize:13}}>Back</button>
      <h2 style={{fontFamily:"'DM Serif Display',serif",fontWeight:400,color:"#fff",margin:"0 0 4px"}}>Progress</h2>
      <p style={{color:"#444",fontSize:13,marginBottom:24}}>Track your weights over time</p>
      {exs.length===0&&<p style={{color:"#444",fontSize:14}}>Log some workouts to see progress.</p>}
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:24}}>
        {exs.map(e=>(
          <button key={e} onClick={()=>setSel(sel===e?null:e)} style={{padding:"6px 12px",borderRadius:20,fontSize:12,cursor:"pointer",border:"1px solid "+(sel===e?"#5AE8A2":"#2a2a2a"),background:sel===e?"#5AE8A222":"#111",color:sel===e?"#5AE8A2":"#888"}}>{e}</button>
        ))}
      </div>
      {sel&&hist.length>0&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <h3 style={{margin:0,fontSize:16,color:"#fff",fontWeight:500}}>{sel}</h3>
            {improved&&<span style={{fontSize:12,color:"#5AE8A2",background:"#5AE8A211",padding:"3px 8px",borderRadius:12}}>Improving</span>}
          </div>
          <div style={{marginBottom:20}}>
            <div style={{display:"flex",alignItems:"flex-end",gap:4,height:80}}>
              {hist.slice(-10).map((h,i)=>(
                <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                  <span style={{fontSize:9,color:"#444"}}>{h.weight}kg</span>
                  <div style={{width:"100%",borderRadius:"4px 4px 0 0",height:maxW>0?(h.weight/maxW*52)+"px":"4px",background:i===hist.slice(-10).length-1?"#5AE8A2":"#2a2a2a",minHeight:4}}/>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:4}}>
              {hist.slice(-10).map((h,i)=>(
                <div key={i} style={{flex:1,textAlign:"center"}}>
                  <span style={{fontSize:9,color:"#333"}}>{new Date(h.date).toLocaleDateString("en-GB",{day:"numeric",month:"numeric"})}</span>
                </div>
              ))}
            </div>
          </div>
          {hist.slice().reverse().map((h,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #141414"}}>
              <span style={{fontSize:13,color:"#888"}}>{fmtDate(h.date)}</span>
              <span style={{fontSize:13,color:"#ccc"}}>{h.weight>0?h.weight+"kg":"BW"} · {h.sets}x{h.reps}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  )
}

function App(){
  const[workouts,setWorkouts]=useState(loadWorkouts);
  const[view,setView]=useState("home");
  const[logType,setLogType]=useState(null);
  useEffect(()=>{saveWorkouts(workouts)},[workouts]);
  const save=useCallback(w=>{setWorkouts(p=>[...p,w]);setView("home")},[]);
  const start=id=>{setLogType(id);setView("log")};
  return(
    <div className="app">
      {view==="home"&&<HomeView workouts={workouts} onStart={start} onHistory={()=>setView("history")} onProgress={()=>setView("progress")}/>}
      {view==="log"&&logType&&<LogWorkout typeId={logType} onSave={save} onBack={()=>setView("home")}/>}
      {view==="history"&&<HistoryView workouts={workouts} onBack={()=>setView("home")}/>}
      {view==="progress"&&<ProgressView workouts={workouts} onBack={()=>setView("home")}/>}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:420,background:"rgba(8,8,8,0.9)",backdropFilter:"blur(12px)",borderTop:"1px solid #1a1a1a",display:"flex",justifyContent:"space-around",padding:"12px 0 28px"}}>
        {[{id:"home",icon:"☰",label:"Today"},{id:"history",icon:"◷",label:"Log"},{id:"progress",icon:"↗",label:"Progress"}].map(tab=>(
          <button key={tab.id} onClick={()=>setView(tab.id)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:view===tab.id?"#fff":"#444"}}>
            <span style={{fontSize:18}}>{tab.icon}</span>
            <span style={{fontSize:10,letterSpacing:"0.06em"}}>{tab.label}</span>
          </button>
        ))}
      </div>
    </div>
  )
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
